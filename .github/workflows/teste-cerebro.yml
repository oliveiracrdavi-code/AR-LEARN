# Workflow TEMPORÁRIO de verificação — não faz parte da esteira autônoma.
# Existe só para validar OpenRouter + Groq a partir do ambiente real de
# execução (GitHub Actions), já que a sandbox de desenvolvimento tem uma
# restrição de rede de plataforma que bloqueia esses hosts. Apagar este
# arquivo depois que o teste confirmar que está tudo certo.
name: "[Temporário] Teste do cérebro (OpenRouter + Groq + Supabase)"

on:
  workflow_dispatch: {}

jobs:
  testar-cerebro:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        # O arquivo do workflow precisa existir no branch main pro
        # workflow_dispatch aparecer na aba Actions, mas main não tem o
        # projeto (package.json, lib/, scripts/) — só a branch de
        # trabalho tem. Por isso o checkout aponta explicitamente pra
        # ela, em vez de usar o ref que disparou o workflow.
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Validar o schema do contrato JSON (offline)
        run: npm run schema:teste

      - name: Teste leve do Groq (fallback Whisper — só valida a chave, sem transcrever)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          codigo=$(curl -s -o /tmp/groq.json -w "%{http_code}" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models)
          if [ "$codigo" != "200" ]; then
            echo "Groq respondeu HTTP $codigo — chave inválida ou serviço fora"; exit 1
          fi
          echo "Groq OK (HTTP 200). Whisper disponível:"
          grep -o '"id":"whisper[^"]*"' /tmp/groq.json || echo "(nenhum modelo whisper listado!)"

      - name: Testar o cérebro isolado (OpenRouter, com fallback Groq configurado)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx tsx scripts/testar-cerebro-isolado.ts

      - name: Gerar fixture real (Fase 2) — mercado imobiliário + mapa mental via Kroki
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/gerar-fixture-real.ts

      - name: Teste leve do Supabase (valida NEXT_PUBLIC_SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY novos, sem expor valores)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Secret ausente (URL ou service role key vazia)"; exit 1
          fi
          codigo=$(curl -s -o /tmp/supabase.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/learns?select=id&limit=1")
          if [ "$codigo" != "200" ]; then
            echo "Supabase respondeu HTTP $codigo — secret inválida, URL errada, ou RLS bloqueando o service role (não deveria)"
            exit 1
          fi
          echo "Supabase OK (HTTP 200) — GitHub Secrets NEXT_PUBLIC_SUPABASE_URL e SUPABASE_SERVICE_ROLE_KEY lidos e válidos."
