# Workflow TEMPORÁRIO de verificação — renderiza a videoaula (Remotion)
# a partir do fixture da Fase 2. Não faz parte da esteira autônoma.
# Precisa de GOOGLE_CLOUD_TTS_CREDENTIALS_JSON cadastrada como secret
# antes de rodar com narração real — sem essa secret, roda mudo.
name: "[Temporário] Renderizar videoaula (Remotion)"

on:
  workflow_dispatch: {}

jobs:
  renderizar-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar fixture real (mercado imobiliário) + mapa mental
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/gerar-fixture-real.ts

      - name: Preparar props do Remotion
        run: npm run remotion:props -- scripts/output/fixture-mercado-imobiliario.json scripts/output/remotion-props.json

      - name: Renderizar vídeo (Remotion)
        run: npx remotion render remotion/src/index.ts LearnVideo scripts/output/video.mp4 --props=scripts/output/remotion-props.json

      - name: Upload do vídeo renderizado
        uses: actions/upload-artifact@v4
        with:
          name: video-learn
          path: scripts/output/video.mp4
