# Workflow TEMPORÁRIO de verificação — gera os 3 ativos da Fase 2
# (PDF, mapa mental, videoaula com narração real) a partir do fixture
# "mercado imobiliário", ponta a ponta. Não faz parte da esteira
# autônoma. Voz oficial: Edge TTS, pt-BR-AntonioNeural — não precisa de
# nenhuma credencial/API key.
name: "[Temporário] Gerar os 3 ativos (Fase 2, com narração real)"

on:
  workflow_dispatch: {}

jobs:
  gerar-ativos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium do Playwright (necessário pro PDF)
        run: npx playwright install --with-deps chromium

      - name: Gerar fixture real (mercado imobiliário) + mapa mental (SVG/PNG via Kroki)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/gerar-fixture-real.ts

      - name: Gerar PDF de resumo (só texto — mapa mental é ativo separado)
        run: npx tsx scripts/testar-pdf.ts scripts/output/fixture-mercado-imobiliario.json

      - name: Sintetizar narração real (Edge TTS, pt-BR-AntonioNeural)
        run: npx tsx scripts/sintetizar-narracao-fixture.ts

      - name: Preparar props do Remotion (com narração real sincronizada)
        run: npx tsx scripts/preparar-props-remotion.ts scripts/output/fixture-mercado-imobiliario.json scripts/output/remotion-props.json public/narracao-fixture.mp3 scripts/output/narracao-fixture-duracoes.json

      - name: Conferir narração em public/ (diagnóstico)
        run: ls -la public/

      - name: Renderizar vídeo (Remotion)
        run: npx remotion render remotion/src/index.ts LearnVideo scripts/output/video.mp4 --props=scripts/output/remotion-props.json --public-dir="$(pwd)/public"

      - name: Upload — vídeo renderizado
        uses: actions/upload-artifact@v4
        with:
          name: video-learn
          path: scripts/output/video.mp4

      - name: Upload — PDF de resumo
        uses: actions/upload-artifact@v4
        with:
          name: fixture-pdf
          path: scripts/output/fixture-mercado-imobiliario.pdf

      - name: Upload — imagem do mapa mental (PNG)
        uses: actions/upload-artifact@v4
        with:
          name: fixture-mapa-png
          path: scripts/output/fixture-mercado-imobiliario-mapa.png

      - name: Upload — narração isolada (Edge TTS)
        uses: actions/upload-artifact@v4
        with:
          name: fixture-narracao
          path: public/narracao-fixture.mp3
