# Workflow TEMPORÁRIO — teste ISOLADO do TTS (Cloudflare Workers AI /
# MeloTTS): só "texto em português -> áudio", antes de plugar no
# pipeline inteiro. Não faz parte da esteira autônoma.
name: "[Temporário] Teste isolado do TTS (Cloudflare)"

on:
  workflow_dispatch: {}

jobs:
  testar-tts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Testar TTS isolado (Cloudflare Workers AI, MeloTTS)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx tsx scripts/testar-tts-isolado.ts

      - name: Upload do áudio gerado
        uses: actions/upload-artifact@v4
        with:
          name: teste-tts-cloudflare-pt
          path: scripts/output/teste-tts-cloudflare-pt.mp3
