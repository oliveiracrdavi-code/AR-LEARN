# Workflow TEMPORÁRIO — teste ISOLADO do TTS (Edge TTS / msedge-tts,
# serviço "Read Aloud" do Microsoft Edge): só "texto em português ->
# áudio", antes de plugar no pipeline inteiro. Não faz parte da esteira
# autônoma.
#
# Histórico: este workflow já testou Google Cloud TTS (descartado por
# fricção de billing/CPF) e Cloudflare Workers AI/MeloTTS (testado,
# REPROVADO — misturava fonética de outro idioma). Voz feminina
# pt-BR-FranciscaNeural (Edge TTS) já aprovada por ouvido. Job
# "testar-vozes-masculinas" compara 3 candidatas masculinas (perfil
# Leandro Carozzo) — decisão ainda pendente do usuário. Ver
# docs/historico.md.
name: "[Temporário] Teste isolado do TTS (Edge TTS)"

on:
  workflow_dispatch: {}

jobs:
  testar-tts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Testar TTS isolado (Edge TTS, msedge-tts)
        run: npx tsx scripts/testar-tts-edge-isolado.ts

      - name: Upload do áudio gerado
        uses: actions/upload-artifact@v4
        with:
          name: teste-tts-edge-pt
          path: scripts/output/teste-tts-edge-pt.mp3

  testar-vozes-masculinas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Testar 3 vozes masculinas candidatas (Edge TTS, msedge-tts)
        run: npx tsx scripts/testar-tts-edge-vozes-masculinas.ts

      - name: Upload — pt-BR-AntonioNeural
        uses: actions/upload-artifact@v4
        with:
          name: teste-tts-edge-pt-BR-AntonioNeural
          path: scripts/output/teste-tts-edge-pt-BR-AntonioNeural.mp3

      - name: Upload — pt-BR-HumbertoNeural
        uses: actions/upload-artifact@v4
        with:
          name: teste-tts-edge-pt-BR-HumbertoNeural
          path: scripts/output/teste-tts-edge-pt-BR-HumbertoNeural.mp3

      - name: Upload — pt-BR-DonatoNeural
        uses: actions/upload-artifact@v4
        with:
          name: teste-tts-edge-pt-BR-DonatoNeural
          path: scripts/output/teste-tts-edge-pt-BR-DonatoNeural.mp3

  testar-validacao-duracao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Testar validação de piso de duração (roteiro deliberadamente curto)
        run: npx tsx scripts/testar-validacao-duracao.ts

  testar-formula-duracao-cerebro:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch de trabalho, com o projeto completo)
        uses: actions/checkout@v4
        with:
          ref: claude/ar-learn-platform-setup-63c3tl

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar fixture real (só cérebro OpenRouter + estimativa de duração, sem TTS nem render)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npx tsx scripts/gerar-fixture-real.ts
